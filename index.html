<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class RAM-ifications</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        body.touch-ui {
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        body.light-mode {
            background: #f2efe4;
            color: #153015;
        }
        body.compact-ui h1 {
            margin: 8px 0 2px;
            font-size: 20px;
        }
        body.compact-ui #mode-banner {
            font-size: 12px;
            margin-bottom: 2px;
        }
        body.compact-ui #ui-layer {
            padding: 6px 8px;
            font-size: 12px;
        }
        body.compact-ui #tower-hint {
            display: none !important;
        }
        #mode-banner {
            width: var(--game-width);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        body.touch-ui #mode-banner {
            position: sticky;
            top: 0;
            z-index: 80;
            padding: 8px 0 4px;
            background: linear-gradient(180deg, rgba(10, 10, 10, 0.98), rgba(10, 10, 10, 0.88));
        }
        body.touch-ui.light-mode #mode-banner {
            background: linear-gradient(180deg, rgba(242, 239, 228, 0.98), rgba(242, 239, 228, 0.9));
        }
        body.compact-ui .tower-btn {
            padding: 4px 8px;
            font-size: 11px;
        }
        body.compact-ui #game-container {
            margin-top: 6px;
        }
        :root {
            --game-width: min(95vw, 1200px);
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            margin-top: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        body.light-mode #game-container {
            border-color: #b7b09d;
            box-shadow: 0 0 18px rgba(65, 98, 65, 0.16);
        }
        canvas {
            background: #000;
            cursor: crosshair;
            width: var(--game-width);
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        #ui-layer {
            width: var(--game-width); padding: 10px; display: flex; justify-content: space-between; flex-wrap: wrap;
        }
        body.touch-ui #ui-layer {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 8px 0;
        }
        body.touch-ui #ui-layer > div {
            padding: 6px 8px;
            border: 1px solid #295029;
            background: rgba(5, 18, 5, 0.85);
            text-align: center;
        }
        body.touch-ui.light-mode #ui-layer > div {
            border-color: #96a996;
            background: rgba(255, 252, 244, 0.94);
        }
        body.light-mode #ui-layer,
        body.light-mode #tower-hint {
            color: #153015;
        }
        #tower-hint {
            width: var(--game-width);
            text-align: center;
            margin: 10px 0 0 0;
            line-height: 1.45;
        }
        .rainbow-text {
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }
        #tower-select {
            display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
        }
        .tower-btn {
            background: #111; color: #00ff00; border: 2px solid #333;
            padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px;
        }
        .tower-btn:hover { border-color: #00ff00; }
        .tower-btn.selected { border-color: #00ffff; background: #002200; }
        body.light-mode .tower-btn {
            background: #fffdf7;
            color: #153015;
            border-color: #9fb09f;
        }
        body.light-mode .tower-btn:hover {
            border-color: #2d6b2d;
        }
        body.light-mode .tower-btn.selected {
            border-color: #2d6b2d;
            background: #dfead9;
        }
        #compact-ui-toggle {
            margin-left: 8px;
            display: none;
        }
        #audio-mute-toggle {
            margin-left: 8px;
        }
        #restart-toggle {
            margin-left: 8px;
            display: none;
        }
        #runner-narrative {
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(680px, 90vw);
            border: 2px solid #2a5a2a;
            background: rgba(3, 18, 3, 0.95);
            box-shadow: 0 0 24px rgba(0, 255, 0, 0.2);
            padding: 14px;
            z-index: 20;
            color: #c8ffc8;
            line-height: 1.45;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            max-height: min(85vh, 760px);
            overflow-y: auto;
        }
        #runner-narrative-copy {
            width: min(52%, 320px);
            min-height: 320px;
            padding: 10px 12px 12px 12px;
            margin-left: auto;
            background: linear-gradient(270deg, rgba(4, 14, 4, 0.92), rgba(4, 14, 4, 0.72) 72%, rgba(4, 14, 4, 0.18));
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }
        #runner-narrative h3 {
            margin: 0 0 8px 0;
            color: #9dff9d;
            font-size: 16px;
        }
        #runner-narrative-body {
            white-space: pre-line;
            font-size: 14px;
        }
        #runner-narrative .tower-btn {
            margin-top: 12px;
        }
        #runner-touch-hint {
            position: absolute;
            left: 12px;
            bottom: 12px;
            max-width: min(72%, 320px);
            padding: 7px 10px;
            border: 1px solid rgba(120, 210, 120, 0.36);
            background: rgba(3, 18, 3, 0.82);
            color: #e3ffe3;
            font-size: 11px;
            line-height: 1.3;
            box-shadow: 0 0 16px rgba(0, 255, 0, 0.12);
            pointer-events: none;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 180ms ease, transform 180ms ease;
            z-index: 12;
        }
        body.touch-ui #runner-touch-hint {
            opacity: 1;
            transform: translateY(0);
        }
        body.touch-ui.touch-hint-dismissed #runner-touch-hint,
        body.touch-ui.touch-hint-hidden #runner-touch-hint {
            opacity: 0;
            transform: translateY(8px);
        }
        body.light-mode #runner-touch-hint {
            border-color: rgba(90, 120, 90, 0.28);
            background: rgba(255, 252, 244, 0.92);
            color: #183818;
            box-shadow: 0 0 16px rgba(70, 110, 70, 0.1);
        }
        #runner-narrative.runner-narrative-theme-neutral {
            border-color: #2a5a2a;
            box-shadow: 0 0 24px rgba(0, 255, 0, 0.2);
        }
        #runner-narrative.runner-narrative-theme-hopeful {
            border-color: #c6a343;
            box-shadow: 0 0 24px rgba(255, 205, 90, 0.35);
            color: #fff2c6;
        }
        #runner-narrative.runner-narrative-theme-happy {
            border-color: #31a85e;
            box-shadow: 0 0 24px rgba(79, 255, 151, 0.35);
            color: #d6ffe5;
        }
        #runner-narrative.runner-narrative-theme-somber {
            border-color: #8b4242;
            box-shadow: 0 0 24px rgba(186, 80, 80, 0.3);
            color: #ffd8d8;
        }
        #runner-narrative.runner-narrative-theme-victory {
            border-color: #f8d14a;
            box-shadow: 0 0 26px rgba(255, 210, 70, 0.4);
            background:
                linear-gradient(135deg, rgba(255, 0, 0, 0.12), rgba(255, 127, 0, 0.12), rgba(255, 255, 0, 0.12), rgba(0, 255, 0, 0.12), rgba(0, 0, 255, 0.12), rgba(139, 0, 255, 0.12)),
                rgba(3, 18, 3, 0.95);
            color: #fff7d2;
        }
        body.light-mode #runner-narrative {
            border-color: #7ca47c;
            background: rgba(249, 246, 238, 0.96);
            box-shadow: 0 0 24px rgba(70, 110, 70, 0.16);
            color: #173317;
        }
        body.light-mode #runner-narrative-copy {
            background: linear-gradient(270deg, rgba(255, 253, 247, 0.96), rgba(248, 244, 232, 0.88) 72%, rgba(248, 244, 232, 0.18));
            border-left-color: rgba(25, 60, 25, 0.12);
        }
        body.light-mode #runner-narrative h3 {
            color: #244824;
        }
        .legend-card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #2b4f2b;
            padding: 4px 6px;
            background: #071107;
            width: 100%;
            min-width: 0;
            cursor: pointer;
            transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
            min-height: 42px;
        }
        body.light-mode .legend-card {
            border-color: #9fb09f;
            background: #f9f6ee;
        }
        .legend-card img {
            width: 22px;
            height: 22px;
            image-rendering: pixelated;
        }
        .legend-card-label {
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.9);
            color: #143114;
            border-radius: 3px;
            line-height: 1.2;
        }
        body.light-mode .legend-card-label {
            background: rgba(255, 255, 255, 0.95);
            color: #183818;
            border: 1px solid rgba(90, 120, 90, 0.18);
        }
        .legend-tooltip {
            position: absolute;
            left: -1px;
            right: -1px;
            bottom: calc(100% - 1px);
            transform: translateY(12px);
            min-height: 0;
            max-height: 0;
            padding: 10px 12px;
            border: 1px solid #4f8f4f;
            border-bottom: 0;
            background: rgba(3, 18, 3, 0.97);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.18);
            color: #d8ffd8;
            opacity: 0;
            pointer-events: none;
            overflow-x: hidden;
            overflow-y: auto;
            transition: opacity 150ms ease, transform 150ms ease, max-height 180ms ease;
            z-index: 30;
            line-height: 1.35;
            white-space: pre-line;
            overscroll-behavior: contain;
        }
        body.light-mode .legend-tooltip {
            border-color: #8ca98c;
            background: rgba(255, 253, 247, 0.98);
            box-shadow: 0 0 18px rgba(70, 110, 70, 0.14);
            color: #173317;
        }
        .legend-tooltip strong {
            display: block;
            margin-bottom: 4px;
            color: #9dff9d;
        }
        body.light-mode .legend-tooltip strong {
            color: #244824;
        }
        .legend-tooltip ul {
            margin: 6px 0 0 0;
            padding-left: 16px;
        }
        .legend-tooltip li {
            margin: 3px 0;
        }
        .htg-card-explainer {
            margin-bottom: 10px;
            padding: 8px 10px;
            border: 1px solid rgba(110, 180, 110, 0.28);
            background: rgba(10, 26, 10, 0.65);
        }
        body.light-mode .htg-card-explainer {
            border-color: rgba(90, 120, 90, 0.22);
            background: rgba(233, 240, 228, 0.92);
        }
        .htg-mini-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .htg-mini-card {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 7px 8px;
            border: 1px solid rgba(110, 180, 110, 0.28);
            background: rgba(7, 17, 7, 0.88);
        }
        .htg-mini-card img {
            width: 20px;
            height: 28px;
            flex: 0 0 auto;
            image-rendering: pixelated;
        }
        .htg-mini-meta {
            font-size: 11px;
            color: #d8ffd8;
        }
        .htg-mini-line {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            color: #f1fff1;
            font-size: 11px;
            line-height: 1.25;
        }
        .htg-mini-line strong {
            color: #ffffff;
        }
        .htg-sep {
            color: #8acb8a;
        }
        body.light-mode .htg-mini-card {
            border-color: rgba(90, 120, 90, 0.22);
            background: rgba(255, 255, 255, 0.95);
        }
        body.light-mode .htg-mini-meta {
            color: #284728;
        }
        body.light-mode .htg-mini-line {
            color: #264426;
        }
        body.light-mode .htg-mini-line strong {
            color: #173317;
        }
        body.light-mode .htg-sep {
            color: #628862;
        }
        .legend-card[data-card-id="htg-members"].is-expanded .legend-tooltip {
            left: -1px;
            right: auto;
            width: min(420px, 84vw);
            max-height: 720px;
        }
        @media (max-width: 680px) {
            .legend-card[data-card-id="htg-members"].is-expanded .legend-tooltip {
                width: min(320px, 86vw);
                max-height: 720px;
            }
        }
        .legend-card.is-expanded .legend-tooltip {
            opacity: 1;
            transform: translateY(-8px);
            max-height: min(520px, 72vh);
        }
        .legend-card.is-expanded {
            transform: translateY(8px);
            border-color: #5eb55e;
            background: #0a1a0a;
        }
        body.light-mode .legend-card.is-expanded {
            border-color: #628862;
            background: #eef4e9;
        }
        .runner-legend-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 6px;
        }
        @media (max-width: 900px) {
            #ui-layer { width: 96vw; }
            #game-container { margin-top: 12px; }
            canvas { max-width: 96vw; height: auto; }
            #runner-narrative-copy { width: min(60%, 320px); }
            .runner-legend-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
        @media (max-width: 680px) {
            .runner-legend-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
            }
            .legend-card {
                min-height: 48px;
            }
            body.touch-ui .legend-card .legend-tooltip {
                display: none;
            }
            body.touch-ui .legend-card.is-expanded {
                transform: none;
            }
            #runner-narrative {
                width: min(96vw, 520px);
                padding: 10px;
            }
            #runner-narrative-copy {
                width: 100%;
                min-height: 0;
                background: linear-gradient(180deg, rgba(4, 14, 4, 0.94), rgba(4, 14, 4, 0.86));
                border-left: 0;
            }
            #runner-touch-hint {
                left: 8px;
                right: 8px;
                bottom: 8px;
                max-width: none;
            }
            #tower-hint {
                width: min(94vw, 520px);
                margin-top: 8px;
                padding: 0 0 10px;
                font-size: 12px;
            }
            body.touch-ui h1 {
                font-size: 24px;
                margin: 10px 0 4px;
            }
        }
        #runner-legend-sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 95;
            transform: translateY(102%);
            opacity: 0;
            pointer-events: none;
            transition: transform 180ms ease, opacity 180ms ease;
        }
        #runner-legend-sheet.is-open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        #runner-legend-sheet-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1, 10, 1, 0.48);
            z-index: 94;
        }
        body.touch-ui.legend-sheet-open #runner-legend-sheet-backdrop {
            display: block;
        }
        #runner-legend-sheet-panel {
            width: min(100%, 560px);
            margin: 0 auto;
            max-height: min(72vh, 680px);
            overflow-y: auto;
            overscroll-behavior: contain;
            border: 1px solid #4f8f4f;
            border-bottom: 0;
            border-radius: 18px 18px 0 0;
            background: rgba(3, 18, 3, 0.985);
            box-shadow: 0 -12px 36px rgba(0, 255, 0, 0.16);
            padding: 12px 14px 18px;
            color: #d8ffd8;
        }
        body.light-mode #runner-legend-sheet-panel {
            border-color: #8ca98c;
            background: rgba(255, 253, 247, 0.985);
            box-shadow: 0 -12px 32px rgba(70, 110, 70, 0.12);
            color: #173317;
        }
        #runner-legend-sheet-grab {
            width: 52px;
            height: 4px;
            margin: 0 auto 10px;
            border-radius: 999px;
            background: rgba(160, 230, 160, 0.45);
        }
        body.light-mode #runner-legend-sheet-grab {
            background: rgba(80, 110, 80, 0.28);
        }
        #runner-legend-sheet-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        #runner-legend-sheet-title {
            margin: 0;
            color: #9dff9d;
            font-size: 16px;
            line-height: 1.2;
        }
        body.light-mode #runner-legend-sheet-title {
            color: #244824;
        }
        #runner-legend-sheet-body {
            font-size: 13px;
            line-height: 1.42;
            white-space: normal;
        }
        #runner-legend-sheet-body p {
            margin: 0 0 10px 0;
        }
        #runner-legend-sheet-body p:last-child {
            margin-bottom: 0;
        }
        @media (min-width: 681px) {
            #runner-legend-sheet,
            #runner-legend-sheet-backdrop {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <h1>CLASS <span class="rainbow-text">RAM-IFICATIONS</span></h1>
    <div id="mode-banner"><span id="mode-label" style="display:none;"></span><button id="audio-mute-toggle" class="tower-btn" type="button">MUTE: OFF</button><button id="theme-toggle" class="tower-btn" type="button">BRIGHT MODE</button><button id="restart-toggle" class="tower-btn" type="button">RESTART</button><button id="compact-ui-toggle" class="tower-btn" type="button">COMPACT UI: OFF</button></div>
    <div id="ui-layer">
        <div><span id="precedent-label">PRECEDENT:</span> <span id="precedent-val">100</span></div>
        <div>LIVES: <span id="lives-val">3</span></div>
        <div>STATUS: <span id="status-val">DISTRICT COURT</span></div>
        <div>YEAR: <span id="year-val">1984</span></div>
    </div>
    <div id="tower-select">
        <button class="tower-btn selected" data-tower="1" title="Coder (Logic) - Boolean Bits, slows Auditors">1 Coder (50)</button>
        <button class="tower-btn" data-tower="2" title="Attorney (Litigation) - Precedents, heavy damage">2 Attorney (75)</button>
        <button class="tower-btn" data-tower="3" title="Activist (Community) - Heals Burden on nearby files">3 Activist (60)</button>
        <button class="tower-btn" data-tower="4" title="Encryption Expert - Firewall, protects towers from Subpoenas">4 Encryption (80)</button>
    </div>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="crt-overlay"></div>
        <div id="runner-touch-hint">Swipe to move. Tap to use Solidarity when your chain is ready.</div>
        <div id="runner-narrative" aria-live="polite" aria-modal="true" role="dialog">
            <div id="runner-narrative-copy">
                <h3 id="runner-narrative-title">Checkpoint</h3>
                <div id="runner-narrative-body"></div>
                <button id="runner-narrative-next" class="tower-btn">PRESS ENTER TO CONTINUE</button>
            </div>
        </div>
    </div>
    <div id="runner-legend" style="display:none; position:relative; z-index:40; width: var(--game-width); margin-top: 8px; font-size: 12px; line-height: 1.35; color:#b7ffb7;"></div>
    <div id="runner-legend-sheet-backdrop" hidden></div>
    <div id="runner-legend-sheet" aria-hidden="true">
        <div id="runner-legend-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="runner-legend-sheet-title">
            <div id="runner-legend-sheet-grab"></div>
            <div id="runner-legend-sheet-header">
                <h3 id="runner-legend-sheet-title">Info</h3>
                <button id="runner-legend-sheet-close" class="tower-btn" type="button">CLOSE</button>
            </div>
            <div id="runner-legend-sheet-body"></div>
        </div>
    </div>
    <p id="tower-hint">Coder (Logic) (50) | Boolean Bits | Slows</p>
    <script src="audio.js"></script>
    <script src="mode-loader.js"></script>
</body>
</html>
